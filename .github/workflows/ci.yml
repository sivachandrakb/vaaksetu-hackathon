name: VaakSetu CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd vaaksetu/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        run: |
          cd vaaksetu
          pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd vaaksetu/frontend
          npm install

      - name: Build frontend
        run: |
          cd vaaksetu/frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -f vaaksetu/docker/Dockerfile.backend -t vaaksetu-backend vaaksetu/backend

      - name: Build frontend Docker image
        run: docker build -f vaaksetu/docker/Dockerfile.frontend -t vaaksetu-frontend vaaksetu/frontend
